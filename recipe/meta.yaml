{% set name = "elegant" %}
{% set version = "2026.2.0" %}
{% set sdds_version = "5.10" %}
{% set build = 1 %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://github.com/rtsoliday/elegant/archive/refs/tags/elegant-{{ version }}.tar.gz
    sha256: 2dfd1db8fe938b7e76b471e1aad2ce27627933e344b831ee9d2fbc5f5174b3ef
    folder: elegant
  # TODO: this should be split to a separate feedstock now...
  - url: https://github.com/rtsoliday/SDDS/archive/refs/tags/SDDS-{{ sdds_version }}.tar.gz
    sha256: 322aec6b5c9d2e620d5252a275dbf8c8dbfe53f58391aed8c30e610f7bc4ec62
    folder: SDDS
  # Standalone nlpp (namelist preprocessor) for cross-compilation:
  - url: https://github.com/ken-lauer/sdds-nlpp/archive/refs/tags/v0.0.1.tar.gz
    sha256: b895864408b607aab66f753db2904f7d2157adc306c61b2d6498f7b6bdb81a2e
    folder: nlpp_standalone

build:
  skip: true  # [win]
  number: {{ build }}
  string: "mpi_{{ mpi }}_h{{ PKG_HASH }}_{{ build }}"
  run_exports:
    - {{ name }} * mpi_{{ mpi }}_*
  ignore_run_exports:
    - libaec  # [linux]

requirements:
  build:
    - {{ compiler("c") }}
    - {{ stdlib("c") }}
    - {{ compiler("cxx") }}
    - {{ compiler("fortran") }}
    - {{ mpi }}
    # TODO: v2.5.1 libfabric complaining about getrandom/glibc 2.25
    - libfabric <2.5.1  # [linux and mpi == "mpich"]
    - make
  host:
    - eigen
    - fftw * mpi_{{ mpi }}_*
    - gsl
    - hdf5 * mpi_{{ mpi }}_*
    - libaec
    - libgd
    - libgomp  # [linux]
    - liblzma-devel
    - libpng
    - libtiff
    - zlib
    - zstd  # [osx]
    # tiff transitive deps directly linked on macOS:
    - lerc  # [osx]
    - libdeflate  # [osx]
    - libjpeg-turbo  # [osx]
    - {{ mpi }}
    - liblapack
    - liblapacke
    - libblas
    - openblas
    # Fortran runtime directly linked on macOS:
    - libgfortran  # [osx]
  run:
    - {{ mpi }}
    - libblas * *openblas
    - libcblas * *openblas
    - zstd  # [osx]
    - openblas
    # Saw this overlinker error in cppbmad-feedstock, too - this is due to
    # gfortran, and only on macos:
    - libgcc     # [osx]

test:
  commands:
    # Set up for OpenMPI testing:
    - export OMPI_MCA_plm=isolated                          # [mpi == "openmpi"]
    - export OMPI_MCA_btl_vader_single_copy_mechanism=none  # [mpi == "openmpi"]
    - export OMPI_MCA_rmaps_base_oversubscribe=yes          # [mpi == "openmpi"]
    # Check that elegant and Pelegant are executable:
    - test -f $PREFIX/bin/Pelegant
    - test -f $PREFIX/bin/elegant
    - elegant
    # Key SDDS tools:
    - test -f $PREFIX/bin/sddsprocess
    - test -f $PREFIX/bin/sddsplot
    - test -f $PREFIX/bin/rpn
    - test -f $PREFIX/bin/sddscontour
    - test -f $PREFIX/bin/sddspseudoinverse
    - test -f $PREFIX/bin/hdf2sdds
    - test -f $PREFIX/bin/sdds2hdf
    - test -f $PREFIX/bin/sddsbrightness
    # A sampling of other expected binaries:
    - test -f $PREFIX/bin/sddsconvert
    - test -f $PREFIX/bin/sddscombine
    - test -f $PREFIX/bin/sddsfft
    - test -f $PREFIX/bin/sddsinterp
    - test -f $PREFIX/bin/sddsquery
    - test -f $PREFIX/bin/sddssort
    - test -f $PREFIX/bin/elegantto
    - test -f $PREFIX/bin/nlpp
    - test -f $PREFIX/bin/editstring
    - test -f $PREFIX/bin/timeconvert

about:
  home: https://github.com/rtsoliday/elegant
  license: EPICS
  license_file:
    - elegant/LICENSE
    - SDDS/meschach/LICENSE
    - SDDS/xlslib/LICENSE
    - SDDS/pgapack/COPYING
  summary: |
    Pelegant is Parallel Elegant, a parallelized accelerator code that
    computes beta functions, matrices, orbits, floor coordinates, amplification
    factors, dynamic aperture, and more
  description: |
    Elegant is an accelerator code that computes beta functions, matrices,
    orbits, floor coordinates, amplification factors, dynamic aperture, and
    more. It does 6-D tracking with matrices and/or canonical integrators, and
    supports a variety of time-dependent elements. It also does optimization
    (e.g., matching), including optimization of tracking results. It is the
    principle accelerator code used at APS.
  doc_url: https://ops.aps.anl.gov/manuals/elegant_latest/elegant.html
  dev_url: https://github.com/rtsoliday/elegant

extra:
  recipe-maintainers:
    - ken-lauer
